name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # daily
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-readme-cards.yml"

concurrency:
  group: update-readme-cards
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_TOKEN || github.token }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=transparent&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.README_STATS_TOKEN || github.token }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet && echo "No card changes" && exit 0
          git commit -m "Update README cards"
          git pull --rebase origin main
          git push
